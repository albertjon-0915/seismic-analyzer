<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Seismic Sampler: 1, 10, 100 Intervals</title>
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 20px; background: #f0f2f5; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        #chart { width: 100%; height: 400px; margin-top: 20px; border: 1px solid #ddd; }
        .controls { display: flex; justify-content: space-between; align-items: flex-end; padding-bottom: 20px; border-bottom: 2px solid #eee; }
        
        .setting-group { display: flex; flex-direction: column; gap: 5px; font-size: 13px; font-weight: bold; }
        select { padding: 8px; border-radius: 4px; border: 1px solid #ccc; width: 150px; }

        .tables-section { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .table-wrapper { max-height: 400px; overflow-y: auto; border: 1px solid #eee; background: #fff; }
        
        table { width: 100%; border-collapse: collapse; }
        th { background: #007bff; color: white; position: sticky; top: 0; padding: 10px; text-align: left; font-size: 13px; }
        td { padding: 8px; border-bottom: 1px solid #eee; font-family: monospace; font-size: 12px; }
        
        .pga-row { background-color: #fff4f4; font-weight: bold; color: #d9534f; }
        .btn-excel { background-color: #28a745; color: white; border: none; padding: 12px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; display: none; }
        h3 { border-left: 4px solid #007bff; padding-left: 10px; margin-bottom: 10px; font-size: 16px; }
    </style>
</head>
<body>

<div class="container">
    <div class="controls">
        <div>
            <h2>Seismic Sampling Master</h2>
            <p id="status" style="margin:0; color:#666;">Select interval and upload .cor file</p>
        </div>

        <div class="setting-group">
            <label>Sampling Interval:</label>
            <select id="intervalSelector">
                <option value="1">1 (100 Hz - Full)</option>
                <option value="10">10 (10 Hz - Fast)</option>
                <option value="100">100 (1 Hz - Lite)</option>
            </select>
        </div>

        <div style="display: flex; gap: 10px;">
            <input type="file" id="fileInput" accept=".cor">
            <button id="downloadBtn" class="btn-excel">Download Excel (.csv)</button>
        </div>
    </div>

    <div id="chart"></div>

    <div class="tables-section">
        <div>
            <h3>Significant Peaks (Calculated from 100Hz)</h3>
            <div class="table-wrapper">
                <table>
                    <thead><tr><th>Time (s)</th><th>Acc (m/s²)</th><th>Type</th></tr></thead>
                    <tbody id="spikeBody"><tr><td colspan="3" style="text-align:center;">Load file...</td></tr></tbody>
                </table>
            </div>
        </div>

        <div>
            <h3>Subsampled Data Stream</h3>
            <div class="table-wrapper">
                <table>
                    <thead><tr><th>Row</th><th>Time (s)</th><th>Acc (m/s²)</th></tr></thead>
                    <tbody id="rawBody"><tr><td colspan="3" style="text-align:center;">Load file...</td></tr></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    let fullData = [];
    let sampledData = [];
    let topSpikes = [];

    const fileInput = document.getElementById('fileInput');
    const intervalSelector = document.getElementById('intervalSelector');

    // Re-process if interval changes
    intervalSelector.addEventListener('change', () => { if(fullData.length > 0) applySampling(); });

    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(event) {
            const lines = event.target.result.split('\n');
            fullData = [];
            let currentTime = 0;

            // 1. RAW DATA EXTRACTION
            lines.forEach((line) => {
                const trimmed = line.trim();
                if (!trimmed || trimmed.startsWith('%')) return;
                const parts = trimmed.split(/\s+/);
                const accVal = parts.length >= 3 ? parseFloat(parts[2]) : parseFloat(parts[0]);
                if (!isNaN(accVal)) {
                    fullData.push({ time: currentTime.toFixed(3), value: accVal });
                    currentTime += 0.01;
                }
            });

            // 2. SPIKE DETECTION (Always done on 100Hz for accuracy)
            let allPeaks = [];
            for (let i = 1; i < fullData.length - 1; i++) {
                const prev = Math.abs(fullData[i-1].value);
                const curr = Math.abs(fullData[i].value);
                const next = Math.abs(fullData[i+1].value);
                if (curr > prev && curr > next && curr > 0.0001) {
                    allPeaks.push({ time: fullData[i].time, value: fullData[i].value });
                }
            }
            allPeaks.sort((a, b) => Math.abs(b.value) - Math.abs(a.value));
            topSpikes = allPeaks.slice(0, 20);

            applySampling();
        };
        reader.readAsText(file);
    });

    function applySampling() {
        const interval = parseInt(intervalSelector.value);
        sampledData = fullData.filter((_, index) => index % interval === 0);

        // Update Tables
        updateSpikeTable();
        updateRawTable();
        
        // Plotting
        Plotly.newPlot('chart', [
            { x: sampledData.map(s => s.time), y: sampledData.map(s => s.value), mode: 'lines', line: {color: '#17BECF', width: 1}, name: `Sampled (${intervalSelector.options[intervalSelector.selectedIndex].text})` },
            { x: topSpikes.slice(0, 5).map(s => s.time), y: topSpikes.slice(0, 5).map(s => s.value), mode: 'markers', marker: {color: 'red', size: 10}, name: 'Major Spikes' }
        ], {
            title: 'Seismic Analysis',
            xaxis: { title: 'Time (Seconds)', rangeslider: {} },
            yaxis: { title: 'Acceleration (m/s²)' }
        });

        document.getElementById('downloadBtn').style.display = "block";
        document.getElementById('status').innerText = `Displaying ${sampledData.length} samples.`;
    }

    function updateSpikeTable() {
        const tbody = document.getElementById('spikeBody');
        tbody.innerHTML = topSpikes.map((s, i) => `
            <tr class="${i === 0 ? 'pga-row' : ''}">
                <td>${s.time}s</td>
                <td>${s.value.toFixed(6)}</td>
                <td>${i === 0 ? 'PGA' : 'Peak'}</td>
            </tr>
        `).join('');
    }

    function updateRawTable() {
        const tbody = document.getElementById('rawBody');
        const interval = parseInt(intervalSelector.value);
        // Show 1000 rows in UI max
        tbody.innerHTML = sampledData.slice(0, 1000).map((s, i) => `
            <tr>
                <td>${i * interval + 1}</td>
                <td>${s.time}s</td>
                <td>${s.value.toExponential(4)}</td>
            </tr>
        `).join('');
    }

    document.getElementById('downloadBtn').addEventListener('click', function() {
        const interval = intervalSelector.value;
        let csv = "Time(s),Acceleration(m/s2)\n" + sampledData.map(s => `${s.time},${s.value}`).join('\n');
        const blob = new Blob([csv], {type: 'text/csv'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `Seismic_Data_Interval_${interval}.csv`;
        a.click();
    });
</script>

</body>
</html>
